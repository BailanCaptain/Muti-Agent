<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三方 CLI 会话台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="kicker">本地多模型会话台</p>
          <h1>顶部角色卡片，左侧历史会话，右侧统一聊天</h1>
          <p class="hero-copy">
            顶部只负责当前这组会话的三位角色。左侧会保留每一次三方对话历史，你切新会话时旧历史不会消失。
          </p>
        </div>
        <div class="hero-actions">
          <button id="refresh-button" class="ghost-button" type="button">刷新</button>
          <div id="health-badge" class="health-badge">服务检查中</div>
        </div>
      </header>

      <section class="provider-strip">
        <div class="strip-head">
          <div>
            <p class="kicker">当前三位角色</p>
            <h2>角色卡片移到顶部</h2>
          </div>
          <button id="new-session-button" class="ghost-button" type="button">新建三方会话</button>
        </div>
        <div id="provider-cards" class="provider-cards"></div>
      </section>

      <main class="workspace">
        <aside class="history-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">历史会话</p>
              <h2>左侧保留所有三方对话</h2>
            </div>
          </div>
          <div id="session-list" class="session-list"></div>
        </aside>

        <section class="chat-shell">
          <div class="chat-head">
            <div>
              <p class="kicker">当前会话</p>
              <h2 id="active-session-title">会话加载中</h2>
              <p id="active-session-meta" class="subtle-line"></p>
            </div>
            <button id="stop-all-button" class="ghost-button" type="button">停止全部</button>
          </div>

          <div id="mention-bar" class="mention-bar"></div>
          <div id="timeline" class="timeline"></div>

          <form id="composer" class="composer">
            <textarea
              id="composer-input"
              rows="4"
              placeholder="例如：@范德彪 你好，或者 @黄仁勋 帮我分析这个报错"
            ></textarea>
            <div class="composer-actions">
              <p id="global-status" class="status-line">页面初始化中...</p>
              <button id="send-button" type="submit">发送</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <template id="provider-card-template">
      <section class="provider-card">
        <div class="provider-main">
          <div class="provider-avatar"></div>
          <div class="provider-copy">
            <div class="provider-title-line">
              <h3 class="provider-name"></h3>
              <span class="provider-status">空闲</span>
            </div>
            <p class="provider-label"></p>
            <p class="provider-preview"></p>
          </div>
        </div>

        <div class="provider-metrics">
          <div>
            <span class="metric-label">当前模型</span>
            <strong class="provider-model-value"></strong>
          </div>
          <div>
            <span class="metric-label">额度</span>
            <strong class="provider-quota"></strong>
          </div>
        </div>

        <div class="provider-tools">
          <div class="provider-model-combobox">
            <input class="provider-model-input" type="text" placeholder="输入模型名" autocomplete="off" />
            <div class="provider-model-menu" hidden></div>
          </div>
          <button class="ghost-button provider-refresh-button" type="button">刷新模型</button>
          <button class="ghost-button provider-save-button" type="button">保存模型</button>
          <button class="ghost-button provider-mention-button" type="button">@ta</button>
          <button class="ghost-button provider-stop-button" type="button">停止</button>
        </div>
      </section>
    </template>

    <template id="session-item-template">
      <button class="session-item" type="button">
        <div class="session-item-title"></div>
        <div class="session-item-meta"></div>
        <div class="session-item-previews"></div>
      </button>
    </template>

    <template id="message-template">
      <article class="message-row">
        <div class="message-meta"></div>
        <div class="message-bubble">
          <div class="message-content"></div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
