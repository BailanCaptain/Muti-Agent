# Multi-Agent Skills Manifest — 路由单一真相源
# 更新日期：2026-04-07

# ─── 开发流程链 ─────────────────────────────────────────
# feat-lifecycle → Design Gate → writing-plans → worktree → tdd
#     → quality-gate → acceptance-guardian → requesting-review → receiving-review
#     → merge-gate → feat-lifecycle(completion)

skills:

  # ── 功能生命周期 ──
  feat-lifecycle:
    description: Feature 立项、讨论、完成的全生命周期管理
    triggers:
      - "新功能"
      - "bugfix"
      - "重构"
      - "开发任务"
      - "feat"
      - "立项"
      - "feature 完成"
      - "验收通过"
    not_for:
      - "纯文档"
      - "纯讨论"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["writing-plans"]
    sop_step: null
    slashCommands:
      - name: "/feat"
        description: "启动功能生命周期"

  # ── 协作思考 ──
  collaborative-thinking:
    description: 单人或多 agent 的创意探索、独立思考、讨论收敛
    triggers:
      - "brainstorm"
      - "讨论"
      - "独立思考"
      - "收敛"
      - "讨论结束"
      - "总结一下"
      - "多视角"
    not_for:
      - "写代码"
      - "执行已定方案"
    agents: [claude, codex, gemini]
    requires_mcp: ["parallel_think"]
    next: []
    sop_step: null
    slashCommands:
      - name: "/think"
        description: "启动协作思考"

  # ── 跨角色交接 ──
  cross-role-handoff:
    description: 跨角色交接，输出五件套
    triggers:
      - "交接"
      - "传话"
      - "handoff"
      - "转交"
    not_for:
      - "自己的任务"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: []
    sop_step: null
    slashCommands:
      - name: "/handoff"
        description: "跨角色交接"

  # ── 计划编写 ──
  writing-plans:
    description: 将 spec/需求拆分为可执行的分步实施计划
    triggers:
      - "写计划"
      - "implementation plan"
      - "拆分步骤"
      - "实施计划"
    not_for:
      - "trivial 改动"
      - "已有计划"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["worktree"]
    sop_step: null
    slashCommands:
      - name: "/plan"
        description: "编写实施计划"

  # ── Worktree 隔离 ──
  worktree:
    description: 创建 Git worktree 隔离开发环境
    triggers:
      - "开始开发"
      - "新 worktree"
      - "开 worktree"
    not_for:
      - "纯文档"
      - "不涉及代码"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["tdd"]
    sop_step: 1
    slashCommands: []

  # ── TDD ──
  tdd:
    description: Red-Green-Refactor 测试驱动开发纪律
    triggers:
      - "写代码"
      - "test first"
      - "TDD"
      - "红绿重构"
      - "实现"
    not_for:
      - "纯文档"
      - "纯调研"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["quality-gate"]
    sop_step: 1
    slashCommands:
      - name: "/tdd"
        description: "测试驱动开发"

  # ── 质量门禁 ──
  quality-gate:
    description: 开发完成后的自检门禁，愿景对照 + spec 合规 + 验证
    triggers:
      - "开发完了"
      - "自检"
      - "声称完成"
      - "准备提 review"
    not_for:
      - "收到 review 反馈"
      - "merge"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["acceptance-guardian"]
    sop_step: 2
    slashCommands:
      - name: "/gate"
        description: "质量门禁自检"

  # ── 独立验收守护 ──
  acceptance-guardian:
    description: 零上下文独立验收，覆盖 feature AC 验收与 bug 修复复现验收
    triggers:
      - "独立验收"
      - "acceptance guardian"
      - "bug 验收"
      - "愿景守护"
      - "逐项验收"
    not_for:
      - "自检"
      - "review"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["requesting-review"]
    sop_step: 2
    slashCommands:
      - name: "/guardian"
        description: "独立验收守护"

  # ── Code Review ──
  code-review:
    description: 严格代码审查：聚焦 bug、风险、行为回归、边界条件和缺失测试
    triggers:
      - "code review"
      - "代码审查"
      - "审查代码"
      - "review 当前 diff"
      - "review 这段代码"
    not_for:
      - "请别人 review"
      - "请求 review"
      - "收到 review"
      - "review 意见"
      - "修复 review"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: []
    sop_step: null
    slashCommands:
      - name: "/review"
        description: "执行代码审查"

  # ── 调试 ──
  debugging:
    description: 系统化 bug 定位：根因调查 → 模式分析 → 假设验证 → 修复
    triggers:
      - "bug"
      - "报错"
      - "test failure"
      - "unexpected behavior"
      - "调试"
    not_for:
      - "新功能开发"
      - "重构"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["quality-gate"]
    sop_step: null
    slashCommands:
      - name: "/debug"
        description: "系统化调试"

  # ── Skill 编写 ──
  writing-skills:
    description: 创建或修改 Multi-Agent skill 的元技能（含 CSO、测试、发布）
    triggers:
      - "写 skill"
      - "新 skill"
      - "修改 skill"
      - "SKILL.md"
      - "multi-agent-skills/"
    not_for:
      - "使用 skill"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["quality-gate"]
    sop_step: null
    slashCommands:
      - name: "/write-skill"
        description: "创建或修改 skill"

  # ── 自我进化 ──
  self-evolution:
    description: Scope Guard + Process Evolution + Knowledge Evolution
    triggers:
      - "scope 偏了"
      - "又犯了"
      - "重复错误"
      - "流程改进"
      - "值得记住"
      - "self-evolution"
    not_for:
      - "日常 SOP 推进"
      - "一次性 bug fix"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: []
    sop_step: null
    slashCommands:
      - name: "/evolve"
        description: "触发自我进化"

  # ── 请求 Review ──
  requesting-review:
    description: 请求 reviewer 审查，先自检再提交
    triggers:
      - "请 review"
      - "帮我看看"
      - "request review"
      - "准备 review"
    not_for:
      - "收到 review"
      - "review 意见"
      - "执行 review"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["receiving-review"]
    # F003: if the author finishes requesting-review but forgets to @ the
    # reviewer, force an automatic hand-off so the SOP chain doesn't stall
    # waiting for a manual prod. Dedupes against line-start @mentions the
    # LLM already produced.
    next_dispatch:
      target: "reviewer"
      prompt_template: "@%TARGET% 我刚完成 requesting-review，上下文见这条消息里的 PR 链接/diff，请 review。"
    sop_step: 3
    slashCommands:
      - name: "/request-review"
        description: "请求 review"

  # ── 接收 Review ──
  receiving-review:
    description: 收到 review 反馈，Red→Green 修复
    triggers:
      - "review 结果"
      - "review 意见"
      - "reviewer 说"
      - "fix these"
      - "修复 review"
    not_for:
      - "请 review"
      - "发 review"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["merge-gate"]
    sop_step: 3
    slashCommands: []

  # ── 合入门禁 ──
  merge-gate:
    description: 合入 dev 的完整流程：门禁检查 → PR → squash merge → 清理
    triggers:
      - "合入"
      - "merge"
      - "准备合入"
      - "合并 PR"
      - "开 PR"
    not_for:
      - "开发中"
      - "review 未通过"
    agents: [claude, codex, gemini]
    requires_mcp: []
    next: ["feat-lifecycle"]
    sop_step: [4, 5]
    slashCommands:
      - name: "/merge"
        description: "合入门禁检查"

# SOP 导航牌
# 每个条目必须有 suggested_skill + ≥1 hard_rules + ≥1 pitfalls
# （pnpm check:skills 强制校验，见 scripts/skill-mount-check.ts:verifySopNavigationQuality）
sop_navigation:
  feat-lifecycle:
    suggested_skill: feat-lifecycle
    hard_rules:
      - "新功能必须先走 Step 0 关联检测（搜 ROADMAP + 历史讨论）"
      - "AC 必须可验证（具体文件/测试/命令，不是'应该工作'）"
    pitfalls:
      - "AC 打勾就标 done，不做愿景对照三问"
      - "立项时不记录 Evolved from，追溯链断裂"

  writing-plans:
    suggested_skill: writing-plans
    hard_rules:
      - "计划必须包含 TDD 步骤和检查点"
      - "每步产物在终态保留，不是临时脚手架"
    pitfalls:
      - "没有对齐就直接写代码"
      - "一个步骤做太多事（违反 2-5 分钟 bite-size 规则）"

  worktree:
    suggested_skill: worktree
    hard_rules:
      - "worktree 开之前必须 dev 双向同步 (ahead=0 behind=0)"
      - "新 worktree 必须跑 pnpm mount-skills 挂载三 CLI skills 目录"
    pitfalls:
      - "不同步就开 worktree，合入时冲突地狱"
      - "在主仓库目录里改代码还以为在 worktree"

  tdd:
    suggested_skill: tdd
    hard_rules:
      - "没有失败的测试，就没有实现代码"
      - "必须亲眼看到测试以预期理由失败（不是 typo）"
    pitfalls:
      - "先写实现再补测试"
      - "跳过 RED 阶段直接 GREEN"

  quality-gate:
    suggested_skill: quality-gate
    hard_rules:
      - "测试全部通过才能进入 review"
      - "自检报告必须包含愿景覆盖度（对照小孙原话）"
    pitfalls:
      - "声称完成但没跑全量测试"
      - "只跑改动相关的测试没跑全量"

  acceptance-guardian:
    suggested_skill: acceptance-guardian
    hard_rules:
      - "实现者不能自己做独立验收"
      - "守护 agent 必须零上下文，只看 AC + 代码 + 测试 + 运行结果"
    pitfalls:
      - "跳过独立验收直接提 review"
      - "接受'应该通过'不要求本次运行证据"

  code-review:
    suggested_skill: code-review
    hard_rules:
      - "Review 必须 Read→Green：先写失败测试复现问题，再提修复意见"
      - "同一个体不能 review 自己的代码"
    pitfalls:
      - "光挑毛病不给根因分析"
      - "把 nit 和 P1 混在一起列，让收信人分不清优先级"

  request-review:
    suggested_skill: requesting-review
    hard_rules:
      - "自检报告必须先完成"
      - "Review 请求必须明确范围和风险点"
    pitfalls:
      - "没自检就提 review"
      - "范围描述模糊，让 reviewer 不知道要看哪里"

  receive-review:
    suggested_skill: receiving-review
    hard_rules:
      - "P1/P2 必须在当前迭代修完"
      - "禁止表演性同意（'好的我改'但实际没改）"
    pitfalls:
      - "收到 P1 修完后没 re-trigger review"
      - "对 reviewer 的质疑一律认同而不核实"

  merge-gate:
    suggested_skill: merge-gate
    hard_rules:
      - "必须有 reviewer 明确放行（APPROVED）"
      - "必须用 gh pr merge --squash（禁止本地 squash push）"
    pitfalls:
      - "reviewer 没说 APPROVED 就合入"
      - "本地 squash + push + gh pr close（PR 显示 closed 不是 merged）"

# Lint 规则
lint:
  rules:
    - id: has-triggers
      check: "每个 skill 必须有 triggers 和 not_for"
    - id: has-description
      check: "每个 skill 必须有 description"
    - id: next-exists
      check: "next 指向的 skill 必须在 manifest 中存在"
    - id: has-skill-md
      check: "每个 skill 必须有对应的 SKILL.md 文件"
    - id: slash-unique
      check: "slashCommands.name 全局唯一"
    - id: agents-valid
      check: "agents 只能是 claude/codex/gemini"
